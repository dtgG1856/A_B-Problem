<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多功能计算器 - 在线评测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Consolas', monospace;
            background: #0d1117; color: #c9d1d9;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .container {
            background: #161b22; border: 1px solid #30363d;
            border-radius: 12px; padding: 40px;
            max-width: 500px; width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 { font-size: 28px; margin-bottom: 8px; color: #58a6ff; }
        .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 30px; }
        .input-row { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
        .input-row input {
            flex: 1; background: #0d1117; border: 1px solid #30363d;
            border-radius: 6px; padding: 12px 16px; color: #c9d1d9;
            font-size: 18px; font-family: 'Consolas', monospace; outline: none;
            transition: border-color 0.2s;
        }
        .input-row input:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.1); }
        select {
            background: #0d1117; border: 1px solid #30363d;
            border-radius: 6px; padding: 12px 16px; color: #c9d1d9;
            font-size: 18px; font-family: 'Consolas', monospace; outline: none;
            cursor: pointer; transition: border-color 0.2s;
        }
        select:focus { border-color: #58a6ff; }
        button {
            width: 100%; background: #238636; color: white;
            border: 1px solid #2ea043; border-radius: 6px; padding: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: background 0.2s; margin-bottom: 20px;
        }
        button:hover { background: #2ea043; }
        button:active { background: #196c2e; }
        .result {
            background: #0d1117; border: 1px solid #30363d;
            border-radius: 6px; padding: 16px; min-height: 50px;
            font-family: 'Consolas', monospace; font-size: 16px;
            display: flex; align-items: center;
        }
        .result.success { border-color: #238636; color: #7ee787; }
        .result.error   { border-color: #da3633; color: #f85149; }
        .result.loading { border-color: #d2991d; color: #d2991d; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; display: inline-block; }
        .dot-success { background: #238636; }
        .dot-error   { background: #da3633; }
        .dot-loading { background: #d2991d; animation: pulse 1s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>多功能计算器</h1>
        <p class="subtitle">支持加、减、乘、除、取模、异或、最大公因数</p>

        <div class="input-row">
            <input type="number" id="numA" placeholder="a" autofocus>
            <select id="operator">
                <option value="add">+ (加)</option>
                <option value="sub">− (减)</option>
                <option value="mul">× (乘)</option>
                <option value="mod">% (取模)</option>
                <option value="xor">⊕ (异或)</option>
                <option value="gcd">gcd (最大公因数)</option>
            </select>
            <input type="number" id="numB" placeholder="b">
        </div>

        <button onclick="calculate()">提交 (Submit)</button>

        <div class="result" id="resultBox">
            <span id="statusIcon"></span>
            <span id="resultText">等待输入...</span>
        </div>
    </div>

    <script>
        async function callBackend(op, a, b) {
            const response = await fetch(`http://localhost:8080/api/${op}?a=${a}&b=${b}`);
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            return data.result;
        }

        async function calculate() {
            const inputA = document.getElementById('numA');
            const inputB = document.getElementById('numB');
            const operator = document.getElementById('operator');
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');
            const statusIcon = document.getElementById('statusIcon');

            const a = inputA.value.trim();
            const b = inputB.value.trim();
            const op = operator.value;

            const opSymbols = { add: '+', sub: '−', mul: '×', mod: '%', xor: '⊕', gcd: 'gcd' };
            const opSymbol = opSymbols[op];

            if (a === '' || b === '') {
                resultBox.className = 'result error';
                statusIcon.innerHTML = '<span class="status-dot dot-error"></span>';
                resultText.textContent = 'Error: 两个输入框不能为空';
                return;
            }

            const numA = parseInt(a);
            const numB = parseInt(b);

            if (isNaN(numA) || isNaN(numB)) {
                resultBox.className = 'result error';
                statusIcon.innerHTML = '<span class="status-dot dot-error"></span>';
                resultText.textContent = 'Error: 请输入有效的整数';
                return;
            }

            resultBox.className = 'result loading';
            statusIcon.innerHTML = '<span class="status-dot dot-loading"></span>';
            resultText.textContent = '评测中...';

            try {
                const result = await callBackend(op, numA, numB);
                resultBox.className = 'result success';
                statusIcon.innerHTML = '<span class="status-dot dot-success"></span>';
                resultText.textContent = `Accepted: ${numA} ${opSymbol} ${numB} = ${result}`;
            } catch (error) {
                resultBox.className = 'result error';
                statusIcon.innerHTML = '<span class="status-dot dot-error"></span>';
                resultText.textContent = `Runtime Error: ${error.message}`;
            }
        }

        document.getElementById('numB').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') calculate();
        });
        document.getElementById('numA').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('numB').focus();
        });
    </script>
</body>
</html>
