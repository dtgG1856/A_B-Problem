<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多功能计算器 · 在线API演示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Consolas', monospace;
            background: #0d1117; color: #c9d1d9;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .container {
            background: #161b22; border: 1px solid #30363d;
            border-radius: 12px; padding: 40px;
            max-width: 520px; width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        h1 { font-size: 28px; margin-bottom: 8px; color: #58a6ff; }
        .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 30px; }
        .input-row { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
        .input-row input {
            flex: 2; min-width: 120px;
            background: #0d1117; border: 1px solid #30363d;
            border-radius: 8px; padding: 14px 16px; color: #c9d1d9;
            font-size: 18px; font-family: 'Consolas', monospace; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-row input:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.15); }
        .input-row select {
            flex: 1; min-width: 100px;
            background: #0d1117; border: 1px solid #30363d;
            border-radius: 8px; padding: 14px 12px; color: #c9d1d9;
            font-size: 16px; font-family: 'Consolas', monospace; outline: none;
            cursor: pointer; transition: border-color 0.2s;
            appearance: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="%238b949e"><path d="M7 10l5 5 5-5z"/></svg>');
            background-repeat: no-repeat; background-position: right 10px center; padding-right: 32px;
        }
        select:focus { border-color: #58a6ff; }
        #paramB { transition: opacity 0.2s ease, transform 0.2s ease; }
        .hidden { opacity: 0; transform: scaleX(0); pointer-events: none; position: absolute; }
        .button-group { display: flex; gap: 12px; margin-bottom: 20px; }
        button {
            flex: 1; background: #238636; color: white;
            border: 1px solid #2ea043; border-radius: 8px; padding: 12px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover { background: #2ea043; }
        button:active { transform: scale(0.97); }
        button.secondary {
            background: #21262d; border-color: #30363d; color: #c9d1d9;
        }
        button.secondary:hover { background: #30363d; }
        .result {
            background: #0d1117; border: 1px solid #30363d;
            border-radius: 8px; padding: 16px; min-height: 50px;
            font-family: 'Consolas', monospace; font-size: 16px;
            display: flex; align-items: center; margin-bottom: 25px;
            transition: border-color 0.3s, color 0.3s;
        }
        .result.success { border-color: #238636; color: #7ee787; }
        .result.error   { border-color: #da3633; color: #f85149; }
        .result.loading { border-color: #d2991d; color: #d2991d; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 10px; display: inline-block; }
        .dot-success { background: #238636; }
        .dot-error   { background: #da3633; }
        .dot-loading { background: #d2991d; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .history { margin-top: 10px; }
        .history h3 { font-size: 16px; color: #8b949e; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .history-list { list-style: none; max-height: 180px; overflow-y: auto; }
        .history-list li {
            background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
            padding: 8px 12px; margin-bottom: 6px; cursor: pointer;
            font-size: 14px; display: flex; justify-content: space-between;
            transition: background 0.2s;
        }
        .history-list li:hover { background: #161b22; border-color: #58a6ff; }
        .history-expr { color: #c9d1d9; }
        .history-result { color: #7ee787; font-weight: 600; margin-left: 10px; }
        .clear-history { font-size: 12px; color: #8b949e; cursor: pointer; margin-left: auto; }
        .clear-history:hover { color: #f85149; }
    </style>
</head>
<body>
    <div class="container">
        <h1>多功能计算器</h1>
        <p class="subtitle">加·减·乘·取模·异或·按位或·最大公因数·正弦·余弦</p>

        <div class="input-row">
            <input type="number" id="numA" placeholder="数字 a" autofocus>
            <select id="operator">
                <option value="add">+ 加法</option>
                <option value="sub">− 减法</option>
                <option value="mul">× 乘法</option>
                <option value="mod">% 取模</option>
                <option value="xor">⊕ 异或</option>
                <option value="gcd">gcd 最大公因数</option>
                <option value="sin">sin 正弦</option>
                <option value="cos">cos 余弦</option>
                <option value="or">| 按位或</option>
            </select>
            <input type="number" id="numB" placeholder="数字 b">
        </div>

        <div class="button-group">
            <button onclick="calculate()">提交</button>
            <button class="secondary" onclick="clearInputs()">清除</button>
        </div>

        <div class="result" id="resultBox">
            <span id="statusIcon"></span>
            <span id="resultText">等待输入...</span>
        </div>

        <div class="history">
            <h3>历史记录 <span class="clear-history" onclick="clearHistory()">清空</span></h3>
            <ul class="history-list" id="historyList"></ul>
        </div>
    </div>

    <script>
        const MAX_HISTORY = 10;
        let history = JSON.parse(localStorage.getItem('calc_history') || '[]');

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            history.slice().reverse().forEach((item) => {
                const li = document.createElement('li');
                li.innerHTML = `<span class="history-expr">${item.expr}</span><span class="history-result">= ${item.result}</span>`;
                li.onclick = () => loadHistoryItem(item);
                list.appendChild(li);
            });
            localStorage.setItem('calc_history', JSON.stringify(history));
        }

        function loadHistoryItem(item) {
            document.getElementById('operator').value = item.op;
            document.getElementById('numA').value = item.a;
            if (item.b !== undefined && item.b !== null) {
                document.getElementById('numB').value = item.b;
            }
            toggleParamB();
            calculate();
        }

        function clearHistory() {
            history = [];
            localStorage.removeItem('calc_history');
            renderHistory();
        }

        function addHistory(op, a, b, result) {
            const opSymbols = { add:'+', sub:'−', mul:'×', mod:'%', xor:'⊕', gcd:'gcd', sin:'sin', cos:'cos', or:'|' };
            const expr = (op === 'sin' || op === 'cos') ? `${opSymbols[op]}(${a})` : `${a} ${opSymbols[op]} ${b}`;
            history.push({ op, a, b, expr, result });
            if (history.length > MAX_HISTORY) history.shift();
            renderHistory();
        }

        function toggleParamB() {
            const op = document.getElementById('operator').value;
            const inputB = document.getElementById('numB');
            if (op === 'sin' || op === 'cos') {
                inputB.classList.add('hidden');
                inputB.value = '';
                inputB.removeAttribute('required');
            } else {
                inputB.classList.remove('hidden');
            }
        }

        async function callBackend(op, a, b = null) {
            let url = `http://localhost:8080/api/${op}?a=${encodeURIComponent(a)}`;
            if (b !== null && b !== undefined) {
                url += `&b=${encodeURIComponent(b)}`;
            }
            const response = await fetch(url);
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            return data.result;
        }

        async function calculate() {
            const inputA = document.getElementById('numA');
            const inputB = document.getElementById('numB');
            const operator = document.getElementById('operator');
            const resultBox = document.getElementById('resultBox');
            const resultText = document.getElementById('resultText');
            const statusIcon = document.getElementById('statusIcon');

            const a = inputA.value.trim();
            const b = inputB.value.trim();
            const op = operator.value;

            if (a === '') {
                resultBox.className = 'result error';
                statusIcon.innerHTML = '<span class="status-dot dot-error"></span>';
                resultText.textContent = 'Error: 请输入数字 a';
                return;
            }
            if (op !== 'sin' && op !== 'cos' && b === '') {
                resultBox.className = 'result error';
                statusIcon.innerHTML = '<span class="status-dot dot-error"></span>';
                resultText.textContent = 'Error: 请输入数字 b';
                return;
            }

            const numA = parseFloat(a);
            const numB = (op !== 'sin' && op !== 'cos') ? parseFloat(b) : null;
            if (isNaN(numA) || ((op !== 'sin' && op !== 'cos') && isNaN(numB))) {
                resultBox.className = 'result error';
                statusIcon.innerHTML = '<span class="status-dot dot-error"></span>';
                resultText.textContent = 'Error: 请输入有效的数字';
                return;
            }

            resultBox.className = 'result loading';
            statusIcon.innerHTML = '<span class="status-dot dot-loading"></span>';
            resultText.textContent = '计算中...';

            try {
                const result = (op !== 'sin' && op !== 'cos')
                    ? await callBackend(op, numA, numB)
                    : await callBackend(op, numA);
                resultBox.className = 'result success';
                statusIcon.innerHTML = '<span class="status-dot dot-success"></span>';
                const symbol = { add:'+', sub:'−', mul:'×', mod:'%', xor:'⊕', gcd:'gcd', sin:'sin', cos:'cos', or:'|'}[op];
                const expr = (op === 'sin' || op === 'cos') ? `${symbol}(${numA})` : `${numA} ${symbol} ${numB}`;
                resultText.textContent = `${expr} = ${result}`;
                addHistory(op, numA, numB, result);
            } catch (error) {
                resultBox.className = 'result error';
                statusIcon.innerHTML = '<span class="status-dot dot-error"></span>';
                resultText.textContent = `Error: ${error.message}`;
            }
        }

        function clearInputs() {
            document.getElementById('numA').value = '';
            document.getElementById('numB').value = '';
            const resultBox = document.getElementById('resultBox');
            resultBox.className = 'result';
            document.getElementById('statusIcon').innerHTML = '';
            document.getElementById('resultText').textContent = '等待输入...';
            document.getElementById('numA').focus();
        }

        document.getElementById('operator').addEventListener('change', toggleParamB);
        document.getElementById('numA').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const op = document.getElementById('operator').value;
                if (op !== 'sin' && op !== 'cos') {
                    document.getElementById('numB').focus();
                } else {
                    calculate();
                }
            }
        });
        document.getElementById('numB').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') calculate();
        });

        toggleParamB();
        renderHistory();
    </script>
</body>
</html>
